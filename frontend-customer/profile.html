<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - The Nisha Cars Transformers</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Content Header -->
      <div id="header-container"></div>

      <!-- Alert Container -->
      <div id="alert-container"></div>

      <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; flex-grow: 1;">
        <!-- Left: Edit Profile Info -->
        <div class="card" style="height: fit-content;">
          <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="user-cog" style="color: var(--accent-primary);"></i> Profile Information
          </h3>
          <form id="profile-form">
            <!-- Profile Avatar Preview & URL -->
            <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&auto=format&fit=crop&q=60" id="profile-avatar-preview" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-primary);" alt="Avatar">
              <div style="flex-grow: 1;">
                <label class="form-label" for="profile-image-upload">Upload Profile Photo</label>
                <input type="file" id="profile-image-upload" accept="image/*" class="form-control" style="padding: 0.5rem;">
                <input type="hidden" id="profile-image-url">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="full-name">Full Name</label>
              <input type="text" id="full-name" class="form-control" placeholder="Your full name" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <!-- Email is readonly because it is unique to account -->
              <input type="email" id="email" class="form-control" style="background: rgba(0,0,0,0.4); cursor: not-allowed; opacity: 0.7;" readonly>
            </div>

            <div class="form-group">
              <label class="form-label" for="phone">Phone Number</label>
              <input type="tel" id="phone" class="form-control" placeholder="Your phone number" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="address">Street Address</label>
              <input type="text" id="address" class="form-control" placeholder="Your physical address" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
              Save Profile Changes <i data-lucide="save"></i>
            </button>
          </form>
        </div>

        <!-- Right: Change Password -->
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
          <!-- Password Card -->
          <div class="card">
            <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
              <i data-lucide="key-round" style="color: var(--accent-primary);"></i> Change Password
            </h3>
            <form id="password-form">
              <div class="form-group">
                <label class="form-label" for="current-password">Current Password</label>
                <div class="password-input-container">
                  <input type="password" id="current-password" class="form-control" placeholder="••••••••" required>
                  <button type="button" class="password-toggle-btn" tabindex="-1">
                    <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="new-password">New Password</label>
                <div class="password-input-container">
                  <input type="password" id="new-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                  <button type="button" class="password-toggle-btn" tabindex="-1">
                    <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm New Password</label>
                <div class="password-input-container">
                  <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                  <button type="button" class="password-toggle-btn" tabindex="-1">
                    <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                  </button>
                </div>
              </div>

              <button type="submit" class="btn btn-primary" style="width: 100%;">
                Update Password <i data-lucide="lock"></i>
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/sidebar.js?v=2.0"></script>
  <script src="js/profile.js"></script>
</body>
</html>
