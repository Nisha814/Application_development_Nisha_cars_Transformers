<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service History - The Nisha Cars Transformers</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Content Header -->
      <div id="header-container"></div>

      <!-- Main History Container -->
      <div class="card" style="flex-grow: 1;">
        <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
          <i data-lucide="history" style="color: var(--accent-primary);"></i> My Service Records
        </h3>

        <!-- Table containing history -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Service Type</th>
                <th>Vehicle Info</th>
                <th>Technician</th>
                <th>Cost</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="history-table-body">
              <tr>
                <td colspan="7" style="color: var(--text-secondary); text-align: center;">Loading service records...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center;">
    <div class="card" style="width: 90%; max-width: 550px; background: var(--bg-secondary); border: 1px solid var(--accent-primary);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.75rem;">
        <h3 style="font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
          <i data-lucide="file-text" style="color: var(--accent-primary);"></i> Service Record Details
        </h3>
        <button id="close-modal-btn" class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">✕</button>
      </div>
      <div id="modal-content" style="display: flex; flex-direction: column; gap: 1rem; font-size: 0.95rem;">
        <!-- Filled dynamically -->
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/sidebar.js?v=2.0"></script>
  <script src="js/service-history.js"></script>
</body>
</html>
