<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - The Nisha Cars Transformers</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .star-rating {
      display: flex;
      gap: 0.25rem;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }
    
    .star-rating input {
      display: none;
    }
    
    .star-rating label {
      cursor: pointer;
      color: rgba(255,255,255,0.2);
      transition: color 0.2s;
    }
    
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: #f1c40f;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Content Header -->
      <div id="header-container"></div>

      <!-- Alert Container -->
      <div id="alert-container"></div>

      <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem; flex-grow: 1;">
        <!-- Left: Submit Review Form -->
        <div class="card" style="height: fit-content;">
          <h3 id="form-title" style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="message-square-plus" style="color: var(--accent-primary);"></i> Write a Review
          </h3>
          <form id="review-form">
            <input type="hidden" id="review-id">

            <div class="form-group">
              <label class="form-label" for="service-center">Service Center</label>
              <select id="service-center" class="form-control" required>
                <option value="" disabled selected>Loading service centers...</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="service-type">Service Type</label>
              <select id="service-type" class="form-control" required>
                <option value="" disabled selected>Select the service</option>
                <option value="Oil Change">Oil & Filter Change</option>
                <option value="Brake Pad Replacement">Brake Service / Pads</option>
                <option value="Diagnostics Inquiry">Full Diagnostics & Electrical</option>
                <option value="Wheel Alignment">Wheel Alignment & Balance</option>
                <option value="Engine Tune-Up">Major Engine Tune-Up</option>
                <option value="AC Maintenance">AC Recharge & Service</option>
                <option value="General Service">General Service</option>
                <option value="Parts Purchase">Parts Purchase</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Rating</label>
              <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required />
                <label for="star5" title="5 stars"><i data-lucide="star" style="fill: currentColor; stroke: none;"></i></label>
                <input type="radio" id="star4" name="rating" value="4" />
                <label for="star4" title="4 stars"><i data-lucide="star" style="fill: currentColor; stroke: none;"></i></label>
                <input type="radio" id="star3" name="rating" value="3" />
                <label for="star3" title="3 stars"><i data-lucide="star" style="fill: currentColor; stroke: none;"></i></label>
                <input type="radio" id="star2" name="rating" value="2" />
                <label for="star2" title="2 stars"><i data-lucide="star" style="fill: currentColor; stroke: none;"></i></label>
                <input type="radio" id="star1" name="rating" value="1" />
                <label for="star1" title="1 star"><i data-lucide="star" style="fill: currentColor; stroke: none;"></i></label>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="title">Review Title</label>
              <input type="text" id="title" class="form-control" placeholder="e.g. Great service!" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="comment">Comment</label>
              <textarea id="comment" class="form-control" rows="4" placeholder="Tell us about your experience..." required></textarea>
            </div>

            <div style="display: flex; gap: 0.75rem;">
              <button type="submit" id="submit-btn" class="btn btn-primary" style="flex-grow: 1;">
                Submit Review <i data-lucide="send"></i>
              </button>
              <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display: none;">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <!-- Right: Previous Reviews -->
        <div class="card" style="display: flex; flex-direction: column;">
          <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="message-square" style="color: var(--accent-primary);"></i> My Reviews
          </h3>
          <div id="reviews-list" style="display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: 520px; flex-grow: 1;">
            <p style="color: var(--text-secondary);">Loading your reviews...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
      <h3 style="font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem;">
        <i data-lucide="alert-triangle" style="color: var(--status-danger);"></i> <span id="confirm-modal-title">Delete Review</span>
      </h3>
      <p id="confirm-modal-text" style="color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5;"></p>
      <div style="display: flex; gap: 1rem; justify-content: flex-end;">
        <button id="confirm-modal-cancel" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Keep It</button>
        <button id="confirm-modal-ok" class="btn btn-danger" style="padding: 0.5rem 1rem;">Yes, Delete</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/sidebar.js?v=2.0"></script>
  <script src="js/reviews.js"></script>
</body>
</html>
