<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - The Nisha Cars Transformers</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Lucide Icons for clean symbols -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
  
  <div class="card auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i data-lucide="wrench"></i> Nisha<span>Cars</span>
      </div>
      <div class="auth-subtitle" id="auth-subtitle">Welcome back! Please enter your details.</div>
    </div>

    <!-- Alert / Toast Container -->
    <div id="alert-container"></div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="password-input-container">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
          <button type="button" class="password-toggle-btn" tabindex="-1">
            <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        Sign In <i data-lucide="arrow-right"></i>
      </button>
    </form>

    <!-- Register Form (Hidden by default) -->
    <form id="register-form" style="display: none;">
      <div class="form-group">
        <label class="form-label" for="register-name">Full Name</label>
        <input type="text" id="register-name" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="register-email">Email Address</label>
        <input type="email" id="register-email" class="form-control" placeholder="john@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="register-phone">Phone Number</label>
        <input type="tel" id="register-phone" class="form-control" placeholder="+1 (555) 123-4567" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="register-address">Street Address</label>
        <input type="text" id="register-address" class="form-control" placeholder="123 Main St, Apt 4B">
      </div>
      <div class="form-group">
        <label class="form-label" for="register-password">Password</label>
        <div class="password-input-container">
          <input type="password" id="register-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
          <button type="button" class="password-toggle-btn" tabindex="-1">
            <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        Create Account <i data-lucide="user-plus"></i>
      </button>
    </form>

    <div class="auth-toggle">
      <div id="toggle-to-register">Don't have an account? <a href="#" id="show-register">Sign up for free</a></div>
      <div id="toggle-to-login" style="display: none;">Already have an account? <a href="#" id="show-login">Sign in here</a></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js?v=1.2"></script>
  <script>
    // Initialize icons
    lucide.createIcons();
  </script>
</body>
</html>
