<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - The Nisha Cars Transformers</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Content Header -->
      <div id="header-container"></div>

      <!-- Alert Container -->
      <div id="alert-container"></div>

      <div style="display: grid; grid-template-columns: 1.255fr 1.745fr; gap: 1.5rem; flex-grow: 1;">
        <!-- Left: Booking Form -->
        <div class="card" style="height: fit-content;">
          <h3 id="form-title" style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="plus-circle" style="color: var(--accent-primary);"></i> Schedule Service
          </h3>
          <form id="appointment-form">
            <!-- Hidden field for editing -->
            <input type="hidden" id="appointment-id">

            <div class="form-group">
              <label class="form-label" for="service-type">Service Type</label>
              <select id="service-type" class="form-control" required>
                <option value="" disabled selected>Select a Service</option>
                <option value="Oil Change">Oil & Filter Change</option>
                <option value="Brake Pad Replacement">Brake Service / Pads</option>
                <option value="Diagnostics Inquiry">Full Diagnostics & Electrical</option>
                <option value="Wheel Alignment">Wheel Alignment & Balance</option>
                <option value="Engine Tune-Up">Major Engine Tune-Up</option>
                <option value="AC Maintenance">AC Recharge & Service</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="vehicle-make">Vehicle Make</label>
              <input type="text" id="vehicle-make" class="form-control" placeholder="e.g. Toyota" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="vehicle-model">Vehicle Model</label>
              <input type="text" id="vehicle-model" class="form-control" placeholder="e.g. Corolla" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="vehicle-year">Vehicle Year</label>
              <input type="number" id="vehicle-year" class="form-control" placeholder="e.g. 2021" min="1900" max="2027" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="vehicle-plate">License Plate</label>
              <input type="text" id="vehicle-plate" class="form-control" placeholder="e.g. BA-2-PA-1234" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="preferred-date">Preferred Date</label>
              <input type="date" id="preferred-date" class="form-control" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="preferred-time">Preferred Time</label>
              <input type="time" id="preferred-time" class="form-control" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="notes">Special Notes / Requests</label>
              <textarea id="notes" class="form-control" rows="3" placeholder="Explain symptoms, parts to inspect, or specific details..."></textarea>
            </div>

            <div style="display: flex; gap: 0.75rem;">
              <button type="submit" id="submit-btn" class="btn btn-primary" style="flex-grow: 1;">
                Book Appointment <i data-lucide="calendar"></i>
              </button>
              <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display: none;">
                Cancel
              </button>
            </div>
          </form>
        </div>

        <!-- Right: Current & Past Appointments -->
        <div class="card" style="display: flex; flex-direction: column;">
          <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="list-todo" style="color: var(--accent-primary);"></i> Appointment History
          </h3>
          <div id="appointments-list" style="display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: 520px; flex-grow: 1;">
            <p style="color: var(--text-secondary);">Loading your scheduled services...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
      <h3 style="font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem;">
        <i data-lucide="alert-triangle" style="color: var(--status-danger);"></i> <span id="confirm-modal-title">Confirm Action</span>
      </h3>
      <p id="confirm-modal-text" style="color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5;"></p>
      <div style="display: flex; gap: 1rem; justify-content: flex-end;">
        <button id="confirm-modal-cancel" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Keep It</button>
        <button id="confirm-modal-ok" class="btn btn-danger" style="padding: 0.5rem 1rem;">Yes, Cancel</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/sidebar.js?v=2.0"></script>
  <script src="js/appointments.js"></script>
</body>
</html>
